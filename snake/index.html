<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Snake</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Snake">
  <meta name="theme-color" content="#1a1a1a">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 30%, #2e2e2e 0%, #0a0a0a 100%);
      display: flex; align-items: center; justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── PHONE CHASSIS ── */
    #phone-wrap {
      transform-origin: top center;
    }

    #phone {
      width: 280px;
      background: linear-gradient(165deg, #3e3e3e 0%, #202020 45%, #131313 100%);
      border-radius: 30px 30px 64px 64px;
      padding: 12px 15px 38px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.95),
        0 0 0 1px rgba(255,255,255,0.06),
        inset 0 2px 1px rgba(255,255,255,0.13),
        inset 0 -5px 0 rgba(0,0,0,0.7),
        inset 2px 0 0 rgba(255,255,255,0.03);
      position: relative;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Left volume nub */
    #phone::after {
      content: '';
      position: absolute;
      left: -5px; top: 70px;
      width: 5px; height: 28px;
      background: linear-gradient(90deg, #111, #1e1e1e);
      border-radius: 3px 0 0 3px;
      box-shadow: 0 35px 0 0 #1a1a1a;
    }

    /* ── EARPIECE ── */
    #earpiece {
      display: flex; justify-content: center; gap: 3px;
      margin-bottom: 8px;
    }
    #earpiece span {
      width: 3px; height: 6px;
      background: #0a0a0a;
      border-radius: 2px;
    }

    /* ── FRONT CAMERA DOT ── */
    #cam-row {
      display: flex; justify-content: center; align-items: center; gap: 10px;
      margin-bottom: 8px;
    }
    .cam-dot {
      width: 5px; height: 5px;
      background: #0d0d0d;
      border-radius: 50%;
      border: 1px solid #2a2a2a;
    }

    /* ── SCREEN BEZEL ── */
    #screen-bezel {
      background: #0b0b0b;
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 14px;
      box-shadow: inset 0 5px 15px rgba(0,0,0,0.98), 0 1px 0 rgba(255,255,255,0.03);
    }

    /* ── LCD SCREEN ── */
    #screen {
      background: #8BAC0F;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    /* Scanline overlay for CRT feel */
    #screen::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 9px,
        rgba(0,0,0,0.04) 9px, rgba(0,0,0,0.04) 10px
      );
      pointer-events: none;
      z-index: 20;
    }

    /* Score bar */
    #score-bar {
      background: #7a9a0a;
      padding: 3px 7px 2px;
      font: bold 11px/1 'Courier New', monospace;
      color: #0F380F;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 1px;
    }

    /* Canvas */
    #game-canvas {
      display: block;
      width: 100%;
      aspect-ratio: 20 / 16;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── OVERLAYS ── */
    .ov {
      position: absolute;
      top: 24px; left: 0; right: 0; bottom: 0; /* below score bar */
      background: rgba(139, 172, 15, 0.96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 15;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 8px;
    }

    .ov h1 {
      font-size: 26px; font-weight: 900;
      color: #0F380F;
      letter-spacing: 5px;
      text-shadow: 2px 2px 0 #306230, -1px -1px 0 rgba(0,0,0,0.2);
      margin-bottom: 2px;
    }

    .ov h2 {
      font-size: 13px; font-weight: bold;
      color: #0F380F; letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .ov p { font-size: 9px; color: #306230; }

    .ov .blink { animation: blink 0.9s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Name input */
    #name-input {
      background: #306230;
      border: 2px solid #0F380F;
      color: #9BBC0F;
      padding: 4px 10px;
      font: bold 12px 'Courier New', monospace;
      text-align: center;
      width: 140px; outline: none;
      letter-spacing: 3px; margin: 8px 0 4px;
      text-transform: uppercase;
      -webkit-appearance: none;
    }

    .px-btn {
      background: #0F380F;
      color: #9BBC0F;
      border: none;
      padding: 4px 16px;
      font: bold 10px 'Courier New', monospace;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 4px;
    }

    /* Leaderboard */
    #leaderboard {
      width: 168px;
      font: 9px 'Courier New', monospace;
      color: #0F380F;
      margin-top: 2px;
    }

    .lb-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 3px;
      border-bottom: 1px solid rgba(15,56,15,0.3);
    }
    .lb-row.me { background: rgba(15,56,15,0.15); font-weight: bold; }
    .lb-empty { font-size: 8px; color: #306230; text-align: center; padding: 4px; }

    /* ── NOKIA LOGO ── */
    #nokia-logo {
      text-align: center;
      font: 900 9px Arial, sans-serif;
      color: #3a3a3a;
      letter-spacing: 5px;
      margin-bottom: 12px;
    }

    /* ── SOFT KEYS ── */
    #soft-row {
      display: flex;
      justify-content: space-between;
      padding: 0 4px;
      margin-bottom: 10px;
    }
    .skey {
      width: 74px; height: 26px;
      background: linear-gradient(160deg, #3c3c3c, #1e1e1e);
      border: none; border-radius: 20px;
      color: #555; font: 8px 'Courier New', monospace;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
      -webkit-tap-highlight-color: transparent;
    }
    .skey:active {
      background: linear-gradient(160deg, #2a2a2a, #141414);
      transform: translateY(1px);
    }

    /* ── D-PAD ── */
    #dpad {
      position: relative;
      width: 156px; height: 156px;
      margin: 0 auto;
    }

    .dpad-btn {
      position: absolute;
      width: 52px; height: 52px;
      background: linear-gradient(150deg, #4a4a4a 0%, #252525 100%);
      border: none;
      color: #999; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow:
        0 5px 10px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -2px 0 rgba(0,0,0,0.4);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.07s, box-shadow 0.07s, color 0.07s;
    }

    .dpad-btn:active {
      background: linear-gradient(150deg, #333 0%, #181818 100%);
      color: #ccc;
      transform: scale(0.93);
      box-shadow: 0 2px 5px rgba(0,0,0,0.7);
    }

    #btn-up    { top: 0;    left: 52px; border-radius: 10px 10px 4px 4px; }
    #btn-down  { bottom: 0; left: 52px; border-radius: 4px 4px 10px 10px; }
    #btn-left  { top: 52px; left: 0;    border-radius: 10px 4px 4px 10px; }
    #btn-right { top: 52px; right: 0;   border-radius: 4px 10px 10px 4px; }

    #btn-center {
      top: 52px; left: 52px;
      background: linear-gradient(150deg, #5a5a5a, #303030);
      border-radius: 50%;
      color: #bbb; font-size: 9px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0;
      box-shadow:
        0 5px 10px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }
    #btn-center:active {
      background: linear-gradient(150deg, #444, #202020);
    }

    /* Swipe hint */
    #swipe-hint {
      text-align: center;
      font: 7px 'Courier New', monospace;
      color: #2a2a2a;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* Firebase badge */
    #fb-badge {
      position: absolute;
      top: 3px; right: 4px;
      font: 6px 'Courier New', monospace;
      color: rgba(15,56,15,0.6);
      z-index: 25;
    }
  </style>
</head>
<body>

<div id="phone-wrap">
<div id="phone">
  <!-- Earpiece -->
  <div id="earpiece">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Camera row -->
  <div id="cam-row">
    <div class="cam-dot"></div>
    <div class="cam-dot" style="opacity:0.3"></div>
  </div>

  <!-- Screen -->
  <div id="screen-bezel">
    <div id="screen">
      <div id="score-bar">
        <span id="score-disp">0000</span>
        <span id="hi-disp">HI:0000</span>
      </div>

      <canvas id="game-canvas" width="200" height="160"></canvas>
      <div id="fb-badge"></div>

      <!-- NAME ENTRY -->
      <div class="ov" id="ov-name">
        <h1>SNAKE</h1>
        <p style="margin-bottom:2px">ENTER YOUR NAME:</p>
        <input id="name-input" type="text" maxlength="8" placeholder="PLAYER"
               autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <button class="px-btn" id="name-ok">[ OK ]</button>
      </div>

      <!-- START -->
      <div class="ov" id="ov-start" style="display:none">
        <h1>SNAKE</h1>
        <p id="greet" style="margin-bottom:12px;font-size:10px;color:#0F380F;font-weight:bold;letter-spacing:1px"></p>
        <p class="blink" style="font-size:10px;color:#0F380F">PRESS OK TO PLAY</p>
        <p style="margin-top:16px;font-size:8px">USE D-PAD OR SWIPE</p>
      </div>

      <!-- GAME OVER -->
      <div class="ov" id="ov-gameover" style="display:none">
        <h2>GAME OVER</h2>
        <p id="go-score" style="font-size:14px;font-weight:bold;color:#0F380F;margin-bottom:8px"></p>
        <p style="font-size:8px;letter-spacing:1px;color:#306230;margin-bottom:4px">── TOP 3 ──</p>
        <div id="leaderboard"></div>
        <p class="blink" style="margin-top:10px;font-size:10px;color:#0F380F">PRESS OK TO PLAY</p>
      </div>
    </div>
  </div>

  <!-- Nokia brand -->
  <div id="nokia-logo">NOKIA</div>

  <!-- Soft keys -->
  <div id="soft-row">
    <button class="skey" id="skey-l">MENU</button>
    <button class="skey" id="skey-r">BACK</button>
  </div>

  <!-- D-pad -->
  <div id="dpad">
    <button class="dpad-btn" id="btn-up">▲</button>
    <button class="dpad-btn" id="btn-left">◀</button>
    <button class="dpad-btn" id="btn-center">OK</button>
    <button class="dpad-btn" id="btn-right">▶</button>
    <button class="dpad-btn" id="btn-down">▼</button>
  </div>

  <div id="swipe-hint">SWIPE SCREEN TO STEER</div>
</div>
</div>

<!--
╔══════════════════════════════════════════════════════════════╗
║          GLOBAL LEADERBOARD — FIREBASE SETUP                 ║
╠══════════════════════════════════════════════════════════════╣
║  Scores work locally right now (top 3 saved on this device). ║
║  To share scores across ALL devices:                         ║
║                                                              ║
║  1. Visit https://console.firebase.google.com                ║
║  2. Create a new project (e.g. "snake-leaderboard")          ║
║  3. Left panel → Build → Realtime Database → Create Database ║
║  4. Choose region → "Start in test mode" → Enable            ║
║  5. Left panel → gear icon → Project settings               ║
║  6. Scroll to "Your apps" → click </> → register app        ║
║  7. Copy the firebaseConfig object shown                     ║
║  8. Paste values into FIREBASE_CONFIG below                  ║
║  9. (Optional) tighten security rules later                  ║
╚══════════════════════════════════════════════════════════════╝
-->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   FIREBASE CONFIG  — paste your values here for global scores
   ═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:      "",   // "AIzaSy..."
  authDomain:  "",   // "your-app.firebaseapp.com"
  databaseURL: "",   // "https://your-app-default-rtdb.firebaseio.com"
  projectId:   "",   // "your-project-id"
};
/* ═══════════════════════════════════════════════════════════ */

/* ─── GAME CONFIG ─── */
const COLS = 20, ROWS = 16, CELL = 10;
const PAL = { bg:'#9BBC0F', grid:'#8BAC0F', dark:'#0F380F', mid:'#306230' };
const INIT_SPEED = 185, MIN_SPEED = 55, SPEED_STEP = 8;

/* ─── STATE ─── */
let gState = 'name';        // name | start | playing | gameover
let snake, dir, nextDir, food, score, loopTimer, tickN;
let playerName = '';
let localHi = 0;
let db = null, fbOk = false;

/* ─── CANVAS ─── */
const canvas = document.getElementById('game-canvas');
const cx = canvas.getContext('2d');

/* ─── AUDIO ─── */
let audioCtx;
function ac() { return audioCtx || (audioCtx = new (window.AudioContext||window.webkitAudioContext)()); }

function tone(freq, dur, when = 0, vol = 0.28, type = 'square') {
  try {
    const c = ac(), t = c.currentTime + when;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}

const SFX = {
  eat:   () => { tone(880,0.07); tone(1320,0.08,0.07); },
  die:   () => [392,330,262,196].forEach((f,i) => tone(f,0.13,i*0.14,0.22)),
  start: () => [523,659,784,1047].forEach((f,i) => tone(f,0.09,i*0.09,0.18)),
  menu:  () => tone(660,0.06,0,0.15),
};

/* ─── FIREBASE ─── */
function initFirebase() {
  if (!FIREBASE_CONFIG.apiKey) return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    fbOk = true;
    document.getElementById('fb-badge').textContent = '● GLOBAL';
  } catch(e) { fbOk = false; }
}

async function getLeaderboard() {
  if (fbOk && db) {
    return new Promise(resolve => {
      db.ref('leaderboard')
        .orderByChild('score')
        .limitToLast(10)
        .once('value', snap => {
          const arr = [];
          snap.forEach(c => arr.push(c.val()));
          resolve(arr.sort((a,b) => b.score - a.score).slice(0,3));
        }, () => resolve(localScores()));
    });
  }
  return localScores();
}

function localScores() {
  const raw = localStorage.getItem('snk_scores');
  const arr = raw ? JSON.parse(raw) : [];
  return arr.sort((a,b) => b.score - a.score).slice(0,3);
}

async function submitScore(name, s) {
  const entry = { name: name.substring(0,8).toUpperCase(), score: s, ts: Date.now() };
  if (fbOk && db) {
    try { await db.ref('leaderboard').push(entry); return; } catch(e) {}
  }
  const arr = localScores();
  arr.push(entry);
  arr.sort((a,b) => b.score - a.score);
  localStorage.setItem('snk_scores', JSON.stringify(arr.slice(0,50)));
}

/* ─── GAME LOGIC ─── */
function newGame() {
  snake = [{ x:5, y:8 }, { x:4, y:8 }, { x:3, y:8 }];
  dir = { x:1, y:0 };
  nextDir = { x:1, y:0 };
  score = 0; tickN = 0;
  updateScoreBar();
  spawnFood();
}

function spawnFood() {
  const occ = new Set(snake.map(s => `${s.x},${s.y}`));
  let p;
  do { p = { x: (Math.random()*COLS)|0, y: (Math.random()*ROWS)|0 }; }
  while (occ.has(`${p.x},${p.y}`));
  food = p;
}

function speed() { return Math.max(MIN_SPEED, INIT_SPEED - Math.floor(score/3)*SPEED_STEP); }

function step() {
  tickN++;
  dir = { ...nextDir };
  const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (h.x < 0 || h.x >= COLS || h.y < 0 || h.y >= ROWS ||
      snake.some(s => s.x === h.x && s.y === h.y)) {
    endGame(); return;
  }

  snake.unshift(h);

  if (h.x === food.x && h.y === food.y) {
    score++;
    SFX.eat();
    updateScoreBar();
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
  loopTimer = setTimeout(step, speed());
}

async function endGame() {
  clearTimeout(loopTimer); loopTimer = null;
  gState = 'gameover';
  SFX.die();
  draw();

  if (score > localHi) { localHi = score; localStorage.setItem('snk_hi', localHi); }
  await submitScore(playerName, score);

  document.getElementById('go-score').textContent = `SCORE: ${fmt(score)}`;

  const leaders = await getLeaderboard();
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';

  if (leaders.length === 0) {
    lb.innerHTML = '<div class="lb-empty">NO SCORES YET</div>';
  } else {
    leaders.forEach((e, i) => {
      const mine = e.name === playerName.toUpperCase() && e.score === score;
      const row = document.createElement('div');
      row.className = 'lb-row' + (mine ? ' me' : '');
      row.innerHTML = `<span>${i+1}. ${e.name}</span><span>${fmt(e.score)}</span>`;
      lb.appendChild(row);
    });
  }

  show('ov-gameover');
}

function startPlaying() {
  hide('ov-start'); hide('ov-gameover');
  gState = 'playing';
  newGame();
  SFX.start();
  loopTimer = setTimeout(step, speed());
}

/* ─── DRAWING ─── */
function draw() {
  const W = COLS * CELL, H = ROWS * CELL;

  // Background
  cx.fillStyle = PAL.bg;
  cx.fillRect(0, 0, W, H);

  // Subtle pixel grid
  cx.fillStyle = PAL.grid;
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++) {
      cx.fillRect(x*CELL + CELL-1, y*CELL, 1, CELL-1);
      cx.fillRect(x*CELL, y*CELL + CELL-1, CELL-1, 1);
    }

  // Food — blinks every other tick
  if (food && (tickN % 2 === 0 || gState !== 'playing')) {
    const fx = food.x*CELL, fy = food.y*CELL;
    cx.fillStyle = PAL.dark;
    // Diamond shape (10×10 cell)
    cx.fillRect(fx+4, fy+1, 2, 2);
    cx.fillRect(fx+2, fy+3, 6, 2);
    cx.fillRect(fx+1, fy+4, 8, 2);
    cx.fillRect(fx+2, fy+6, 6, 2);
    cx.fillRect(fx+4, fy+8, 2, 1);
  }

  // Snake — draw body then head on top
  snake.forEach((seg, i) => {
    const px = seg.x*CELL, py = seg.y*CELL;
    cx.fillStyle = PAL.dark;
    cx.fillRect(px+1, py+1, CELL-2, CELL-2);
    if (i > 0) {                          // body: lighter inner
      cx.fillStyle = PAL.mid;
      cx.fillRect(px+3, py+3, CELL-6, CELL-6);
    }
  });

  // Connect adjacent segments (fill the 2px gap between them)
  cx.fillStyle = PAL.dark;
  for (let i = 0; i < snake.length-1; i++) {
    const a = snake[i], b = snake[i+1];
    const dx = b.x-a.x, dy = b.y-a.y;
    if (Math.abs(dx)+Math.abs(dy) !== 1) continue; // skip if not adjacent
    if (dx === 1)       cx.fillRect(a.x*CELL+CELL-1, a.y*CELL+2, 2, CELL-4);
    else if (dx === -1) cx.fillRect(a.x*CELL-1,       a.y*CELL+2, 2, CELL-4);
    else if (dy === 1)  cx.fillRect(a.x*CELL+2, a.y*CELL+CELL-1, CELL-4, 2);
    else                cx.fillRect(a.x*CELL+2, a.y*CELL-1,       CELL-4, 2);
  }
}

/* ─── CONTROLS ─── */
function changeDir(dx, dy) {
  if (gState !== 'playing') return;
  if (dx !== 0 && dir.x === 0) nextDir = { x:dx, y:0 };
  if (dy !== 0 && dir.y === 0) nextDir = { x:0, y:dy };
}

function pressOK() {
  SFX.menu();
  if (gState === 'start' || gState === 'gameover') startPlaying();
}

// D-pad touch/click
function dpadBtn(id, handler) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); handler(); }, { passive:false });
  el.addEventListener('mousedown', e => { e.preventDefault(); handler(); });
}

dpadBtn('btn-up',     () => changeDir(0,-1));
dpadBtn('btn-down',   () => changeDir(0, 1));
dpadBtn('btn-left',   () => changeDir(-1,0));
dpadBtn('btn-right',  () => changeDir( 1,0));
dpadBtn('btn-center', pressOK);
dpadBtn('skey-l', () => {});
dpadBtn('skey-r', () => {});

// Keyboard
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp':    case 'w': case 'W': changeDir(0,-1); break;
    case 'ArrowDown':  case 's': case 'S': changeDir(0, 1); break;
    case 'ArrowLeft':  case 'a': case 'A': changeDir(-1,0); break;
    case 'ArrowRight': case 'd': case 'D': changeDir( 1,0); break;
    case 'Enter': case ' ': pressOK(); break;
  }
});

// Swipe on screen
let tx0, ty0;
canvas.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive:true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { pressOK(); return; }
  Math.abs(dx) > Math.abs(dy)
    ? changeDir(dx > 0 ? 1 : -1, 0)
    : changeDir(0, dy > 0 ? 1 : -1);
}, { passive:true });

/* ─── HELPERS ─── */
function fmt(n) { return String(n).padStart(4, '0'); }

function updateScoreBar() {
  document.getElementById('score-disp').textContent = fmt(score);
  if (score > localHi) localHi = score;
  document.getElementById('hi-disp').textContent = 'HI:' + fmt(localHi);
}

function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

/* ─── NAME ENTRY ─── */
function submitName() {
  const v = document.getElementById('name-input').value.trim().toUpperCase();
  playerName = v || 'PLAYER';
  localStorage.setItem('snk_name', playerName);
  hide('ov-name');
  show('ov-start');
  document.getElementById('greet').textContent = 'HELLO, ' + playerName + '!';
  gState = 'start';
  newGame(); draw();
}

document.getElementById('name-ok').addEventListener('click', submitName);
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

/* ─── PHONE SCALING ─── */
function scalePhone() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const phoneH = 560; // approx rendered height
  const s = Math.min(vw / 300, vh / phoneH, 1);
  document.getElementById('phone-wrap').style.transform = s < 1 ? `scale(${s.toFixed(3)})` : '';
}
window.addEventListener('resize', scalePhone);
scalePhone();

/* ─── GENERATE PWA ICON ─── */
function makePwaIcon() {
  const ic = document.createElement('canvas');
  ic.width = ic.height = 192;
  const c = ic.getContext('2d');
  // Background
  c.fillStyle = '#1a1a1a';
  c.roundRect(0,0,192,192,32); c.fill();
  // Screen
  c.fillStyle = '#8BAC0F';
  c.fillRect(24, 36, 144, 112);
  // Snake on icon
  c.fillStyle = '#0F380F';
  [[3,2],[4,2],[5,2],[5,3],[5,4],[4,4],[3,4],[3,5],[3,6],[4,6],[5,6]].forEach(([x,y]) => {
    c.fillRect(24 + x*16, 36 + y*16, 14, 14);
  });
  // Food
  c.fillRect(24 + 7*16 + 4, 36 + 3*16 + 4, 6, 6);
  const url = ic.toDataURL('image/png');
  let link = document.querySelector("link[rel='apple-touch-icon']");
  if (!link) { link = document.createElement('link'); link.rel = 'apple-touch-icon'; document.head.appendChild(link); }
  link.href = url;
}
makePwaIcon();

/* ─── INIT ─── */
initFirebase();
localHi = parseInt(localStorage.getItem('snk_hi') || '0');

const saved = localStorage.getItem('snk_name');
if (saved) {
  playerName = saved;
  hide('ov-name');
  show('ov-start');
  document.getElementById('greet').textContent = 'HELLO, ' + playerName + '!';
  gState = 'start';
  newGame(); draw();
} else {
  newGame(); draw();
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
