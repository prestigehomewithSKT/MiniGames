<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Snake</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Snake">
  <meta name="theme-color" content="#1a1a1a">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #0d0d0d;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ══════════════════════════════
       SCREEN ZONE  (fills top area)
    ══════════════════════════════ */
    #screen-zone {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #8BAC0F;
      position: relative;
      /* subtle scanlines */
      background-image: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 8px,
        rgba(0,0,0,0.035) 8px, rgba(0,0,0,0.035) 9px
      );
    }

    /* Score bar */
    #score-bar {
      flex: 0 0 auto;
      background: #6e8c09;
      padding: 6px 12px 5px;
      font: bold 14px/1 'Courier New', monospace;
      color: #0F380F;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 2px;
      border-bottom: 2px solid #5a7407;
      position: relative;
      z-index: 5;
    }

    /* Canvas wrapper */
    #canvas-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #9BBC0F; /* LCD green shown outside canvas */
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* centered if canvas is smaller than container */
      position: absolute;
      top: 0; left: 0;
    }

    /* ── OVERLAYS ── */
    .ov {
      position: absolute;
      inset: 0;
      background: rgba(139, 172, 15, 0.97);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 15;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 16px;
    }

    .ov h1 {
      font-size: 36px; font-weight: 900;
      color: #0F380F;
      letter-spacing: 8px;
      text-shadow: 3px 3px 0 #306230, -1px -1px 0 rgba(0,0,0,0.15);
      margin-bottom: 4px;
    }

    .ov h2 {
      font-size: 16px; font-weight: bold;
      color: #0F380F; letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .ov p { font-size: 12px; color: #306230; }
    .ov .blink { animation: blink 0.9s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Name input */
    #name-input {
      background: #306230;
      border: 2px solid #0F380F;
      color: #c8e030;
      padding: 8px 14px;
      font: bold 16px 'Courier New', monospace;
      text-align: center;
      width: 200px; outline: none;
      letter-spacing: 4px;
      margin: 12px 0 6px;
      text-transform: uppercase;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .px-btn {
      background: #0F380F;
      color: #9BBC0F;
      border: none;
      padding: 8px 24px;
      font: bold 13px 'Courier New', monospace;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 6px;
    }

    /* Leaderboard */
    #leaderboard {
      width: 220px;
      font: 11px 'Courier New', monospace;
      color: #0F380F;
      margin-top: 4px;
    }
    .lb-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 6px;
      border-bottom: 1px solid rgba(15,56,15,0.3);
    }
    .lb-row.me { background: rgba(15,56,15,0.15); font-weight: bold; }
    .lb-empty { font-size: 10px; color: #306230; text-align: center; padding: 6px; }

    /* Firebase badge */
    #fb-badge {
      position: absolute;
      top: 4px; right: 6px;
      font: 7px 'Courier New', monospace;
      color: rgba(15,56,15,0.55);
      z-index: 25;
      pointer-events: none;
    }

    /* ══════════════════════════════
       CONTROLS ZONE  (fixed bottom)
    ══════════════════════════════ */
    #controls-zone {
      flex: 0 0 auto;
      background: linear-gradient(180deg, #1e1e1e 0%, #111 100%);
      border-top: 3px solid #0a0a0a;
      padding-bottom: env(safe-area-inset-bottom, 8px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* SKT Mini Games logo strip */
    #nokia-strip {
      width: 100%;
      padding: 2px 0 1px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #skt-logo {
      height: 34px; /* ~70% of previous 48px */
      width: auto;
    }

    /* Soft keys */
    #soft-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 0 20px;
      margin-bottom: 10px;
    }

    .skey {
      width: 90px; height: 36px;
      background: linear-gradient(160deg, #3a3a3a, #1e1e1e);
      border: none; border-radius: 20px;
      color: #555; font: 9px 'Courier New', monospace;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
      -webkit-tap-highlight-color: transparent;
    }
    .skey:active {
      background: linear-gradient(160deg, #282828, #121212);
      transform: translateY(1px);
    }

    /* ── D-PAD (70px buttons) ── */
    #dpad {
      position: relative;
      width: 210px;
      height: 210px;
      margin-bottom: 10px;
    }

    .dpad-btn {
      position: absolute;
      width: 70px; height: 70px;
      background: linear-gradient(150deg, #4c4c4c 0%, #272727 100%);
      border: none;
      color: #aaa; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow:
        0 6px 12px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -3px 0 rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.07s, box-shadow 0.07s, color 0.07s, background 0.07s;
    }

    .dpad-btn:active {
      background: linear-gradient(150deg, #333 0%, #161616 100%);
      color: #ddd;
      transform: scale(0.91);
      box-shadow: 0 2px 5px rgba(0,0,0,0.7);
    }

    #btn-up    { top: 0;    left: 70px; border-radius: 12px 12px 4px 4px; }
    #btn-down  { bottom: 0; left: 70px; border-radius: 4px 4px 12px 12px; }
    #btn-left  { top: 70px; left: 0;    border-radius: 12px 4px 4px 12px; }
    #btn-right { top: 70px; right: 0;   border-radius: 4px 12px 12px 4px; }

    #btn-center {
      top: 70px; left: 70px;
      background: linear-gradient(150deg, #5c5c5c, #323232);
      border-radius: 50%;
      color: #ccc; font-size: 11px;
      font-family: 'Courier New', monospace;
      box-shadow:
        0 6px 12px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.18);
    }
    #btn-center:active {
      background: linear-gradient(150deg, #444, #1e1e1e);
    }
  </style>
</head>
<body>

  <!-- ══ SCREEN ZONE ══ -->
  <div id="screen-zone">
    <div id="score-bar">
      <span id="score-disp">0000</span>
      <span style="font-size:11px;letter-spacing:3px;color:#4a6a04">SNAKE</span>
      <span id="hi-disp">HI:0000</span>
    </div>
    <div id="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="fb-badge"></div>

      <!-- NAME ENTRY -->
      <div class="ov" id="ov-name">
        <h1>SNAKE</h1>
        <p style="margin-bottom:4px;font-size:13px">ENTER YOUR NAME:</p>
        <input id="name-input" type="text" maxlength="8" placeholder="PLAYER"
               autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <button class="px-btn" id="name-ok">[ OK ]</button>
      </div>

      <!-- START -->
      <div class="ov" id="ov-start" style="display:none">
        <h1>SNAKE</h1>
        <p id="greet" style="margin-bottom:16px;font-size:13px;color:#0F380F;font-weight:bold;letter-spacing:2px"></p>
        <p class="blink" style="font-size:13px;color:#0F380F">PRESS OK TO PLAY</p>
        <p style="margin-top:20px;font-size:10px">D-PAD · SWIPE · ARROW KEYS</p>
      </div>

      <!-- GAME OVER -->
      <div class="ov" id="ov-gameover" style="display:none">
        <h2>GAME OVER</h2>
        <p id="go-score" style="font-size:18px;font-weight:bold;color:#0F380F;margin-bottom:10px"></p>
        <p style="font-size:10px;letter-spacing:2px;color:#306230;margin-bottom:6px">── TOP 3 SCORES ──</p>
        <div id="leaderboard"></div>
        <p class="blink" style="margin-top:14px;font-size:13px;color:#0F380F">PRESS OK TO PLAY</p>
      </div>
    </div>
  </div>

  <!-- ══ CONTROLS ZONE ══ -->
  <div id="controls-zone">
    <div id="nokia-strip">
      <img id="skt-logo" src="icon-192.png" alt="SKT Mini Games">
    </div>

    <div id="soft-row">
      <button class="skey" id="skey-l">MENU</button>
      <button class="skey" id="skey-r">BACK</button>
    </div>

    <div id="dpad">
      <button class="dpad-btn" id="btn-up">▲</button>
      <button class="dpad-btn" id="btn-left">◀</button>
      <button class="dpad-btn" id="btn-center">OK</button>
      <button class="dpad-btn" id="btn-right">▶</button>
      <button class="dpad-btn" id="btn-down">▼</button>
    </div>
  </div>

<!--
╔══════════════════════════════════════════════════════════════╗
║          GLOBAL LEADERBOARD — FIREBASE SETUP                 ║
╠══════════════════════════════════════════════════════════════╣
║  Scores work locally right now (top 3 saved on this device). ║
║  To share scores across ALL devices:                         ║
║                                                              ║
║  1. Visit https://console.firebase.google.com                ║
║  2. Create a new project (e.g. "snake-leaderboard")          ║
║  3. Left panel → Build → Realtime Database → Create Database ║
║  4. Choose region → "Start in test mode" → Enable            ║
║  5. Left panel → gear icon → Project settings               ║
║  6. Scroll to "Your apps" → click </> → register app        ║
║  7. Copy the firebaseConfig object shown                     ║
║  8. Paste values into FIREBASE_CONFIG below                  ║
╚══════════════════════════════════════════════════════════════╝
-->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   FIREBASE CONFIG  — paste your values here for global scores
   ═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:      "",   // "AIzaSy..."
  authDomain:  "",   // "your-app.firebaseapp.com"
  databaseURL: "",   // "https://your-app-default-rtdb.firebaseio.com"
  projectId:   "",   // "your-project-id"
};

/* ─── PALETTE ─── */
const PAL = { bg:'#9BBC0F', grid:'#8BAC0F', dark:'#0F380F', mid:'#306230' };
const INIT_SPEED = 185, MIN_SPEED = 55, SPEED_STEP = 8;

/* ─── GRID (dynamic) ─── */
const COLS = 20;
let ROWS = 16;
let CELL = 10;

/* ─── STATE ─── */
let gState = 'name';
let snake, dir, nextDir, food, score, loopTimer, tickN;
let playerName = '';
let localHi = 0;
let db = null, fbOk = false;

/* ─── CANVAS ─── */
const canvas = document.getElementById('game-canvas');
const cx = canvas.getContext('2d');

/* ─── GRID SIZING ─── */
function calcGrid() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  CELL = Math.floor(w / COLS);
  ROWS = Math.max(10, Math.floor(h / CELL));
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}

/* ─── AUDIO ─── */
let audioCtx;
function ac() { return audioCtx || (audioCtx = new (window.AudioContext||window.webkitAudioContext)()); }

function tone(freq, dur, when = 0, vol = 0.28, type = 'square') {
  try {
    const c = ac(), t = c.currentTime + when;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}

const SFX = {
  eat:   () => { tone(880,0.07); tone(1320,0.08,0.07); },
  die:   () => [392,330,262,196].forEach((f,i) => tone(f,0.13,i*0.14,0.22)),
  start: () => [523,659,784,1047].forEach((f,i) => tone(f,0.09,i*0.09,0.18)),
  menu:  () => tone(660,0.06,0,0.15),
};

/* ─── FIREBASE ─── */
function initFirebase() {
  if (!FIREBASE_CONFIG.apiKey) return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    fbOk = true;
    document.getElementById('fb-badge').textContent = '● GLOBAL';
  } catch(e) { fbOk = false; }
}

async function getLeaderboard() {
  if (fbOk && db) {
    return new Promise(resolve => {
      db.ref('leaderboard').orderByChild('score').limitToLast(10)
        .once('value', snap => {
          const arr = [];
          snap.forEach(c => arr.push(c.val()));
          resolve(arr.sort((a,b) => b.score - a.score).slice(0,3));
        }, () => resolve(localScores()));
    });
  }
  return localScores();
}

function localScores() {
  const arr = JSON.parse(localStorage.getItem('snk_scores') || '[]');
  return arr.sort((a,b) => b.score - a.score).slice(0,3);
}

async function submitScore(name, s) {
  const entry = { name: name.substring(0,8).toUpperCase(), score: s, ts: Date.now() };
  if (fbOk && db) {
    try { await db.ref('leaderboard').push(entry); return; } catch(e) {}
  }
  const arr = JSON.parse(localStorage.getItem('snk_scores') || '[]');
  arr.push(entry);
  arr.sort((a,b) => b.score - a.score);
  localStorage.setItem('snk_scores', JSON.stringify(arr.slice(0,50)));
}

/* ─── GAME LOGIC ─── */
function newGame() {
  const startY = Math.floor(ROWS / 2);
  snake = [{ x:5, y:startY }, { x:4, y:startY }, { x:3, y:startY }];
  dir = { x:1, y:0 };
  nextDir = { x:1, y:0 };
  score = 0; tickN = 0;
  updateScoreBar();
  spawnFood();
}

function spawnFood() {
  const occ = new Set(snake.map(s => `${s.x},${s.y}`));
  let p;
  do { p = { x: (Math.random()*COLS)|0, y: (Math.random()*ROWS)|0 }; }
  while (occ.has(`${p.x},${p.y}`));
  food = p;
}

function curSpeed() { return Math.max(MIN_SPEED, INIT_SPEED - Math.floor(score/3)*SPEED_STEP); }

function step() {
  tickN++;
  dir = { ...nextDir };
  const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (h.x < 0 || h.x >= COLS || h.y < 0 || h.y >= ROWS ||
      snake.some(s => s.x === h.x && s.y === h.y)) {
    endGame(); return;
  }

  snake.unshift(h);

  if (h.x === food.x && h.y === food.y) {
    score++;
    SFX.eat();
    updateScoreBar();
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
  loopTimer = setTimeout(step, curSpeed());
}

async function endGame() {
  clearTimeout(loopTimer); loopTimer = null;
  gState = 'gameover';
  SFX.die();
  draw();

  if (score > localHi) { localHi = score; localStorage.setItem('snk_hi', localHi); }
  await submitScore(playerName, score);

  document.getElementById('go-score').textContent = `SCORE: ${fmt(score)}`;

  const leaders = await getLeaderboard();
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';
  if (leaders.length === 0) {
    lb.innerHTML = '<div class="lb-empty">NO SCORES YET</div>';
  } else {
    leaders.forEach((e, i) => {
      const mine = e.name === playerName.toUpperCase() && e.score === score;
      const row = document.createElement('div');
      row.className = 'lb-row' + (mine ? ' me' : '');
      row.innerHTML = `<span>${i+1}. ${e.name}</span><span>${fmt(e.score)}</span>`;
      lb.appendChild(row);
    });
  }
  show('ov-gameover');
}

function startPlaying() {
  hide('ov-start'); hide('ov-gameover');
  gState = 'playing';
  newGame();
  SFX.start();
  loopTimer = setTimeout(step, curSpeed());
}

/* ─── DRAWING ─── */
function draw() {
  const u = CELL / 10; // scale unit so all drawing is proportional

  // Background
  cx.fillStyle = PAL.bg;
  cx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle pixel grid lines
  cx.fillStyle = PAL.grid;
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++) {
      cx.fillRect(x*CELL + CELL-1, y*CELL, 1, CELL-1);
      cx.fillRect(x*CELL, y*CELL + CELL-1, CELL-1, 1);
    }

  // Food — blinks every other tick while playing
  if (food && (tickN % 2 === 0 || gState !== 'playing')) {
    const fx = food.x*CELL, fy = food.y*CELL;
    cx.fillStyle = PAL.dark;
    // Diamond shape, proportional to CELL
    cx.fillRect(fx+4*u, fy+1*u, 2*u, 2*u);
    cx.fillRect(fx+2*u, fy+3*u, 6*u, 2*u);
    cx.fillRect(fx+1*u, fy+4*u, 8*u, 2*u);
    cx.fillRect(fx+2*u, fy+6*u, 6*u, 2*u);
    cx.fillRect(fx+4*u, fy+8*u, 2*u, 1*u);
  }

  // Snake body
  snake.forEach((seg, i) => {
    const px = seg.x*CELL, py = seg.y*CELL;
    cx.fillStyle = PAL.dark;
    cx.fillRect(px+u, py+u, CELL-2*u, CELL-2*u);
    if (i > 0) { // lighter inner on body segments
      cx.fillStyle = PAL.mid;
      cx.fillRect(px+3*u, py+3*u, CELL-6*u, CELL-6*u);
    }
  });

  // Bridge the 2-unit gap between adjacent segments
  cx.fillStyle = PAL.dark;
  for (let i = 0; i < snake.length-1; i++) {
    const a = snake[i], b = snake[i+1];
    const dx = b.x-a.x, dy = b.y-a.y;
    if (Math.abs(dx)+Math.abs(dy) !== 1) continue;
    const m = 2*u; // margin along perpendicular
    if      (dx ===  1) cx.fillRect(a.x*CELL+CELL-u, a.y*CELL+m, 2*u, CELL-2*m);
    else if (dx === -1) cx.fillRect(a.x*CELL-u,       a.y*CELL+m, 2*u, CELL-2*m);
    else if (dy ===  1) cx.fillRect(a.x*CELL+m, a.y*CELL+CELL-u, CELL-2*m, 2*u);
    else                cx.fillRect(a.x*CELL+m, a.y*CELL-u,       CELL-2*m, 2*u);
  }
}

/* ─── CONTROLS ─── */
function changeDir(dx, dy) {
  if (gState !== 'playing') return;
  if (dx !== 0 && dir.x === 0) nextDir = { x:dx, y:0 };
  if (dy !== 0 && dir.y === 0) nextDir = { x:0, y:dy };
}

function pressOK() {
  SFX.menu();
  if (gState === 'start' || gState === 'gameover') startPlaying();
}

function dpadBtn(id, handler) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); handler(); }, { passive:false });
  el.addEventListener('mousedown',  e => { e.preventDefault(); handler(); });
}

dpadBtn('btn-up',     () => changeDir(0,-1));
dpadBtn('btn-down',   () => changeDir(0, 1));
dpadBtn('btn-left',   () => changeDir(-1,0));
dpadBtn('btn-right',  () => changeDir( 1,0));
dpadBtn('btn-center', pressOK);
dpadBtn('skey-l', () => {});
dpadBtn('skey-r', () => {});

// Keyboard
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp':    case 'w': case 'W': changeDir(0,-1); break;
    case 'ArrowDown':  case 's': case 'S': changeDir(0, 1); break;
    case 'ArrowLeft':  case 'a': case 'A': changeDir(-1,0); break;
    case 'ArrowRight': case 'd': case 'D': changeDir( 1,0); break;
    case 'Enter': case ' ': pressOK(); break;
  }
});

// Swipe on canvas
let tx0, ty0;
canvas.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive:true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12) { pressOK(); return; }
  Math.abs(dx) > Math.abs(dy)
    ? changeDir(dx > 0 ? 1 : -1, 0)
    : changeDir(0, dy > 0 ? 1 : -1);
}, { passive:true });

/* ─── HELPERS ─── */
function fmt(n) { return String(n).padStart(4, '0'); }

function updateScoreBar() {
  document.getElementById('score-disp').textContent = fmt(score);
  if (score > localHi) localHi = score;
  document.getElementById('hi-disp').textContent = 'HI:' + fmt(localHi);
}

function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

/* ─── NAME ENTRY ─── */
function submitName() {
  const v = document.getElementById('name-input').value.trim().toUpperCase();
  playerName = v || 'PLAYER';
  localStorage.setItem('snk_name', playerName);
  hide('ov-name');
  show('ov-start');
  document.getElementById('greet').textContent = 'HELLO, ' + playerName + '!';
  gState = 'start';
  newGame(); draw();
}

document.getElementById('name-ok').addEventListener('click', submitName);
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

/* ─── PWA ICON — points directly to the uploaded icon-192.png ─── */
function makePwaIcon() {
  let link = document.querySelector("link[rel='apple-touch-icon']");
  if (!link) {
    link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    document.head.appendChild(link);
  }
  link.href = 'icon-192.png';
}
makePwaIcon();

/* ─── INIT ─── */
initFirebase();
localHi = parseInt(localStorage.getItem('snk_hi') || '0');

// Size the canvas after layout is painted, then start
requestAnimationFrame(() => {
  calcGrid();

  const saved = localStorage.getItem('snk_name');
  if (saved) {
    playerName = saved;
    hide('ov-name');
    show('ov-start');
    document.getElementById('greet').textContent = 'HELLO, ' + playerName + '!';
    gState = 'start';
    newGame(); draw();
  } else {
    newGame(); draw();
  }
});

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
